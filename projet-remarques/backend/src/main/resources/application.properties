# ============================================
# Configuration PostgreSQL
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/remarques_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# Configuration JPA / Hibernate
# ============================================
# create-drop : crée la table au démarrage (pratique pour le dev)
# update : garde les données entre les redémarrages
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# Configuration du serveur
# ============================================
server.port=8080

# ============================================
# Logs (optionnel - pour voir ce qui se passe)
# ============================================
logging.level.com.etudiant=DEBUG
