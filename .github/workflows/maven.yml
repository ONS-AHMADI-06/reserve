name: Java CI with Maven

on:
  push:
    branches: [ "main", "test/acceptation-depot-comptes-rendus" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file projet-remarques/backend/pom.xml

    - name: Test with Cucumber
      run: mvn test --file projet-remarques/backend/pom.xml